"t s1_2\">16 </span>\n<span id=\"t1a_2\" class=\"t s1_2\">14. Thủ tục đăng ký kết hôn có yếu tố nước ngoài</span><span id=\"t1b_2\" class=\"t s1_2\">.............................................. </span><span id=\"t1c_2\" class=\"t s1_2\">17 </span>\n<span id=\"t1d_2\" class=\"t s1_2\">15. Thủ tục đăng ký lại kết hôn</span><span id=\"t1e_2\" class=\"t s1_2\">............................................................................ </span><span id=\"t1f_2\" class=\"t s1_2\">18 </span>\n<span id=\"t1g_2\" class=\"t s1_2\">II. CHỨNG THỰC</span><span id=\"t1h_2\" class=\"t s1_2\">........................................................................................................ </span><span id=\"t1i_2\" class=\"t s1_2\">19 </span>\n<span id=\"t1j_2\" class=\"t s1_2\">16. Chứng thực bản sao từ bản chính giấy tờ, văn bản do cơ quan, tổ chức có </span>\n<span id=\"t1k_2\" class=\"t s1_2\">thẩm quyền của Việt Nam; cơ quan, tổ chức có thẩm quyền của nước ngoài; cơ </span>\n<span id=\"t1l_2\" class=\"t s1_2\">quan, tổ chức có thẩm quyền của Việt Nam liên kết với cơ quan, tổ chức có thẩm </span>\n<span id=\"t1m_2\" class=\"t s1_2\">quyền của nước ngoài cấp hoặc chứng nhận</span><span id=\"t1n_2\" class=\"t s1_2\">....................................................... </span><span id=\"t1o_2\" class=\"t s1_2\">19 </span>\n<span id=\"t1p_2\" class=\"t s1_2\">17. Thủ tục chứng thực chữ ký trong các giấy tờ, văn bản (áp dụng cho cả trường </span>\n<span id=\"t1q_2\" class=\"t s1_2\">hợp chứng thực điểm chỉ và trường hợp người yêu cầu chứng thực không thể ký, </span>\n<span id=\"t1r_2\" class=\"t s1_2\">không thể điểm chỉ được)</span><span id=\"t1s_2\" class=\"t s1_2\">.................................................................................... </span><span id=\"t1t_2\" class=\"t s1_2\">20 </span>\n<span id=\"t1u_2\" class=\"t s1_2\">III. NỘI VỤ, Y TẾ</span><span id=\"t1v_2\" class=\"t s1_2\">......................................................................................................... </span><span id=\"t1w_2\" class=\"t s1_2\">21 </span>\n<span id=\"t1x_2\" class=\"t s1_2\">18. Thăm viếng mộ liệt sĩ</span><span id=\"t1y_2\" class=\"t s1_2\">..................................................................................... </span><span id=\"t1z_2\" class=\"t s1_2\">21 </span>\n<span id=\"t20_2\" class=\"t s1_2\">19. Cấp giấy xác nhận thân nhân của người có công</span><span id=\"t21_2\" class=\"t s1_2\">........................................... </span><span id=\"t22_2\" class=\"t s1_2\">22 </span>\n<span id=\"t23_2\" class=\"t s1_2\">20. Thực hiện, điều chỉnh, thôi hưởng trợ cấp hưu trí xã hội</span><span id=\"t24_2\" class=\"t s1_2\">................................ </span><span id=\"t25_2\" class=\"t s1_2\">23 </span>\n<span id=\"t26_2\" class=\"t s1_2\">21. Hỗ trợ chi phí mai táng cho đối tượng bảo trợ xã hội</span><span id=\"t27_2\" class=\"t s1_2\">..................................... </span><span id=\"t28_2\" class=\"t s1_2\">24 </span>\n<span id=\"t29_2\" class=\"t s1_2\">22. Đổi, cấp lại Giấy xác nhận khuyết tật</span><span id=\"t2a_2\" class=\"t s1_2\">.............................................................. </span><span id=\"t2b_2\" class=\"t s1_2\">25 </span>\n<span id=\"t2c_2\" class=\"t s1_2\">IV. GIÁO DỤC VÀ ĐÀO TẠO, VĂN HÓA - KHOA HỌC VÀ THÔNG TIN</span><span id=\"t2d_2\" class=\"t s1_2\">......................... </span><span id=\"t2e_2\" class=\"t s1_2\">26 </span>\n<span id=\"t2f_2\" class=\"t s1_2\">23. Chuyển trường đối với học sinh tiểu học</span><span id=\"t2g_2\" class=\"t s1_2\">........................................................ </span><span id=\"t2h_2\" class=\"t s1_2\">27 </span>\n<span id=\"t2i_2\" class=\"t s1_2\">24. Chuyển trường đối với học sinh trung học cơ sở</span><span id=\"t2j_2\" class=\"t s1_2\">............................................</span><span id=\"t2k_2\" class=\"t s1_2\">28 </span>\n<span id=\"t2l_2\" class=\"t s1_2\">25. Thủ tục công nhận câu lạc bộ thể thao cơ sở</span><span id=\"t2m_2\" class=\"t s1_2\">................................................ </span><span id=\"t2n_2\" class=\"t s1_2\">29 </span>\n<span id=\"t2o_2\" class=\"t s1_2\">V. NÔNG NGHIỆP VÀ MÔI TRƯỜNG</span><span id=\"t2p_2\" class=\"t s1_2\">........................................................................... </span><span id=\"t2q_2\" class=\"t s1_2\">30 </span>\n<span id=\"t2r_2\" class=\"t s1_2\">26. Giao đất, cho thuê đất, chuyển mục đích sử dụng đất đối với trường hợp giao </span>\n<span id=\"t2s_2\" class=\"t s1_2\">đất, cho thuê đất không đấu giá quyền sử dụng đất, không đấu thầu lựa chọn </span>\n<span id=\"t2t_2\" class=\"t s1_2\">nhà đầu tư thực hiện dự án có sử dụng đất; trường hợp giao đất, cho thuê đất </span>\n<span id=\"t2u_2\" class=\"t s1_2\">thông qua đấu thầu lựa chọn nhà đầu tư thực hiện dự án có sử dụng đất; giao </span>\n<span id=\"t2v_2\" class=\"t s1_2\">đất và giao rừng; cho thuê đất và cho thuê rừng, gia hạn sử dụng đất khi hết thời </span>\n<span id=\"t2w_2\" class=\"t s2_2\">2 </span></div>\n\n</div>\n</body>\n</html>\n","3":"<!DOCTYPE html>\n<html>\n<head>\n<meta http-equiv=\"X-UA-Compatible\" content=\"IE=Edge\" />\n<meta charset=\"utf-8\" />\n</head>\n\n<body style=\"margin: 0;\">\n\n<div id=\"p3\" style=\"overflow: hidden; position: relative; background-color: white; width: 910px; height: 1286px;\">\n<style class=\"shared-css\" type=\"text/css\" >\n.t {\n\ttransform-origin: bottom left;\n\tz-index: 2;\n\tposition: absolute;\n\twhite-space: pre;\n\toverflow: visible;\n\tline-height: 1.5;\n}\n.text-container {\n\twhite-space: pre;\n}\n@supports (-webkit-touch-callout: none) {\n\t.text-container {\n\t\twhite-space: normal;\n\t}\n}\n</style>\n<style type=\"text/css\" >\n\n#t1_3{left:138px;bottom:1232px;letter-spacing:0.16px;}\n#t2_3{left:270px;bottom:1232px;letter-spacing:0.09px;}\n#t3_3{left:779px;bottom:1232px;letter-spacing:0.13px;}\n#t4_3{left:138px;bottom:1205px;letter-spacing:0.14px;word-spacing:0.01p 000;}\n</style>\n<style id=\"fonts3\" type=\"text/css\" >\n\n@font-face {\n\tfont-family: Arial-BoldMT_2mi;\n\tsrc: url(\"assets/fonts/Arial-BoldMT_2mi.woff\") format(\"woff\");\n}\n\n@font-face {\n\tfont-family: Roboto-Medium_2me;\n\tsrc: url(\"assets/fonts/Roboto-Medium_2me.woff\") format(\"woff\");\n}\n\n</style>\n<div id=\"pg3Overlay\" style=\"width:100%; height:100%; position:absolute; z-index:1; background-color:rgba(0,0,0,0); -webkit-user-select: none;\"></div>\n<div id=\"pg3\" style=\"-webkit-user-select: none;\"><object width=\"910\" height=\"1286\" data=\"assets/3.svg\" type=\"image/svg+xml\" id=\"pdf3\" style=\"width:910px; height:1286px; z-index: 0;\"></object></div>\n<div class=\"text-container\"><span id=\"t1_3\" class=\"t s0_3\">hạn sử dụng đất</span><span id=\"t2_3\" class=\"t s0_3\">................................................................................................... </span><span id=\"t3_3\" class=\"t s0_3\">30 </span>\n<span id=\"t4_3\" class=\"t s0_3\">27. Đăng ký đất đai, tài sản gắn liền với đất, cấp Giấy chứng nhận quyền sử dụng </span>\n<span id=\"t5_3\" class=\"t s0_3\">đất, quyền sở hữu tài sản gắn liền với đất lần đầu đối với hộ gia đình, cá nhân, </span>\n<span id=\"t6_3\" class=\"t s0_3\">cộng đồng dân cư, người gốc Việt Nam định cư ở nước ngoài</span><span id=\"t7_3\" class=\"t s0_3\">............................ </span><span id=\"t8_3\" class=\"t s0_3\">32 </span>\n<span id=\"t9_3\" class=\"t s0_3\">28. Hòa giải tranh chấp đất đai</span><span id=\"ta_3\" class=\"t s0_3\">............................................................................ </span><span id=\"tb_3\" class=\"t s0_3\">34 </span>\n<span id=\"tc_3\" class=\"t s0_3\">29. Đính chính Giấy chứng nhận đã cấp lần đầu có sai sót</span><span id=\"td_3\" class=\"t s0_3\">..................................</span><span id=\"te_3\" class=\"t s0_3\">35 </span>\n<span id=\"tf_3\" class=\"t s0_3\">30. Điều chỉnh quyết định giao đất, cho thuê đất, cho phép chuyển mục đíc có sử dụng đất; giao đất và giao rừng; cho thuê đất và cho thuê rừng, gia hạn sử dụng đất khi hết thời hạn sử dụng đất Thời hạn giải quyết 15 ngày làm việc. Mẫu đơn và hướng dẫn viết đơn Mẫu Đơn: 1. Đơn xin chuyển mục đích sử dụng đất 2. Đơn đăng ký biến động 3. Bản cam kết 4. Tờ khai lệ phí trước bạ 5. Tờ khai thuế phi nông nghiệp Hướng dẫn viết đơn: - Đơn xin chuyển mục đích sử dụng đất - Đơn đăng ký biến động - Bản cam kết - Tờ khai lệ phí trước bạ - Tờ khai thuế phi nông nghiệp Chuyên viên hỗ trợ Nguyễn Thị Thu Trinh SĐT/Zalo: 0901254752 Quét mã QR (hoặc bấm vào đường link  File PDF, File Video nằm dưới mã QR) để xem hướng dẫn nộp hồ sơ File PDF File Video 29 \",\"27. Đăng ký đất đai, tài sản gắn liền với đất, cấp Giấy chứng nhận quyền sử dụng đất, quyền sở hữu tài sản gắn liền với đất lần đầu đối với hộ gia đình, cá nhân, cộng đồng dân cư, người gốc Việt Nam định cư ở nước ngoài Thời hạn giải quyết 20 ngày làm việc. Mẫu đơn và hướng dẫn viết đơn Mẫu Đơn: 1. Đơn đăng ký đất đai, tài sản gắn liền với đất (mẫu số 15, 15a, 15b, 15c) 2. Đơn cam kết lựa chọn thửa đất 3. Tờ khai tiền sử dụng đất 4. Tờ khai lệ phí trước bạ 5. Tờ khai thuế phi nông nghiệp 6. Tờ khai thuế thu nhập cá nhân Hướng dẫn viết đơn: - Mẫu số 15 - Mẫu số 15a - Đơn cam kết lựa chọn thửa đất - Tờ khai tiền sử dụng đất - Tờ khai lệ phí trước bạ - Tờ khai thuế phi nông nghiệp - Tờ khai thuế thu nhập cá nhân Chuyên viên hỗ trợ Nguyễn Thị Thu Trinh SĐT/Zalo: 0901254752 Quét mã QR (hoặc bấm vào đường link  File PDF, File Video nằm dưới mã QR) để xem hướng dẫn nộp hồ sơ File PDF File Video 30 \",\"28. Hòa giải tranh chấp đất đai Thời hạn giải quyết 30 ngày làm việc. (*) Mẫu đơn và hướng dẫn viết đơn Mẫu Đơn. Hướng dẫn viết đơn. Chuyên viên hỗ trợ Nguyễn Thị Thu Trinh SĐT/Zalo: 0901254752 Quét mã QR (hoặc bấm vào đường link File PDF, File Video nằm dưới mã QR) để xem hướng dẫn nộp hồ sơ Đang cập nhật File PDF Đang cập nhật File Video 31 \",\"29. Đính chính Giấy chứng nhận đã cấp lần đầu có sai sót Thời hạn giải quyết 8 ngày làm việc. Mẫu đơn và hướng dẫn viết đơn Mẫu Đơn đăng ký biến động đất đai, tài sản gắn liền với đất. Hướng dẫn viết đơn. Chuyên viên hỗ trợ Nguyễn Thị Thu Trinh SĐT/Zalo: 0901254752 Quét mã QR (hoặc bấm vào đường link File PDF, File Video nằm dưới mã QR) để xem hướng dẫn nộp hồ sơ File PDF File Video 32 \",\"30. Điều chỉnh quyết định giao đất, cho thuê đất, cho phép chuyển mục đích sử dụng đất do thay đổi căn cứ quyết định giao đất, cho thuê đất, cho phép chuyển mục đích sử dụng đất; điều chỉnh thời hạn sử dụng đất của dự án đầu tư Thời hạn giải quyết 18 ngày làm việc. Mẫu đơn và hướng dẫn viết đơn Mẫu Đơn đề nghị điều chỉnh quyết định. Hướng dẫn viết đơn. Chuyên viên hỗ trợ Nguyễn Thị Thu Trinh SĐT/Zalo: 0901254752 Quét mã QR (hoặc bấm vào đường link File PDF, File Video nằm dưới mã QR) để xem hướng dẫn nộp hồ sơ File PDF File Video 33 \",\"VI. XÂY DỰNG VÀ CÔNG THƯƠNG 31. Gia hạn giấy phép xây dựng đối với công trình cấp III, cấp IV (công trình Không theo tuyến/Theo tuyến trong đô thị/Tín ngưỡng, tôn giáo/Tượng đài, tranh hoành tráng/Sửa chữa, cải tạo/Theo giai đoạn cho công trình không theo tuyến/Theo giai đoạn cho công trình theo tuyến trong đô thị/Dự án) và nhà ở riêng lẻ Thời hạn giải quyết 5 ngày làm việc. Mẫu đơn và hướng dẫn viết đơn Mẫu Đơn đề nghị điều chỉnh/gia hạn/cấp lại giấy phép xây dựng. Hướng dẫn viết đơn. Chuyên viên hỗ trợ Nguyễn Xuân Lực SĐT/Zalo: 0938141001 Quét mã QR (hoặc bấm vào đường link File PDF, File Video nằm dưới mã QR) để xem hướng dẫn nộp hồ sơ File PDF File Video 34 \",\"32. Cấp giấy phép xây dựng mới đối với công trình cấp III, cấp IV (Công trình không theo tuyến/Theo tuyến trong đô thị/Tín ngưỡng, tôn giáo/Tượng đài, tranh hoành tráng/Theo giai đoạn cho công trình không theo tuyến/Theo giai đoạn cho công trình theo tuyến trong đô thị/Dự án) và nhà ở riêng lẻ Thời hạn giải quyết 18 ngày làm việc. Mẫu đơn và hướng dẫn viết đơn Mẫu Đơn đề nghị cấp giấy phép xây dựng nhà ở riêng lẻ. Hướng dẫn viết đơn. Chuyên viên h
